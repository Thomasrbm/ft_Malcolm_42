<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ft_malcolm — Guide Interactif</title>
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e;
  --blue:#58a6ff; --green:#3fb950; --red:#f85149;
  --yellow:#e3b341; --cyan:#39c5cf; --purple:#bc8cff; --orange:#ffa657;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:15px;}

/* ── Sidebar ── */
#sidebar{width:270px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.logo{padding:20px;border-bottom:1px solid var(--border);}
.logo h1{font-family:monospace;font-size:1.05rem;color:var(--cyan);letter-spacing:1px;}
.logo p{font-size:.75rem;color:var(--muted);margin-top:4px;}
.progress-wrap{padding:12px 20px;border-bottom:1px solid var(--border);}
.progress-label{font-size:.72rem;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .5s ease;}
.step-item{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;position:relative;}
.step-item:hover:not(.locked){background:var(--bg3);}
.step-item.active{border-left-color:var(--blue);background:var(--bg3);}
.step-item.locked{opacity:.35;cursor:not-allowed;}
.step-item.done .s-icon{color:var(--green);}
.step-item.active .s-icon{color:var(--blue);}
.s-icon{font-size:1rem;margin-top:1px;flex-shrink:0;width:20px;text-align:center;}
.s-title{font-size:.82rem;font-weight:600;line-height:1.3;}
.s-sub{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* ── Main ── */
#main{margin-left:270px;flex:1;padding:40px 48px;max-width:900px;}
.step-badge{font-size:.72rem;color:var(--muted);font-family:monospace;margin-bottom:8px;letter-spacing:.5px;}
h2.step-title{font-size:1.7rem;margin-bottom:10px;}
.step-desc{color:var(--muted);line-height:1.7;margin-bottom:32px;font-size:.92rem;}
hr.divider{border:none;border-top:1px solid var(--border);margin:32px 0;}

/* ── Section ── */
.section{margin-bottom:36px;}
.section > h3{font-size:1rem;color:var(--blue);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.section p,.section li{line-height:1.75;color:var(--text);margin-bottom:8px;font-size:.9rem;}
.section ul,.section ol{padding-left:22px;}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;margin:12px 0 20px;}
table{width:100%;border-collapse:collapse;font-size:.82rem;font-family:monospace;}
th{background:var(--bg3);color:var(--muted);padding:8px 12px;text-align:left;border:1px solid var(--border);}
td{padding:8px 12px;border:1px solid var(--border);vertical-align:top;}
tr:nth-child(even) td{background:var(--bg2);}
td.mono{font-family:monospace;color:var(--cyan);}
td.highlight{color:var(--orange);}

/* ── Code ── */
pre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;font-family:'Courier New',monospace;font-size:.82rem;line-height:1.65;margin:12px 0;}
.kw{color:#ff7b72;} .ty{color:var(--orange);} .cm{color:var(--muted);font-style:italic;}
.st{color:#a5d6ff;} .nu{color:#79c0ff;} .fn{color:var(--purple);} .pp{color:var(--yellow);}
.hl{background:#ffffff15;border-radius:3px;padding:0 2px;}

/* ── Byte Frame ── */
.frame-outer{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:20px;margin:16px 0;}
.frame-label{font-size:.75rem;color:var(--muted);margin-bottom:4px;font-family:monospace;}
.frame-seg-label{font-size:.7rem;color:var(--muted);padding:2px 6px;background:var(--bg2);border-radius:3px;display:inline-block;margin-bottom:6px;}
.byte-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;}
.byte{width:44px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .15s;font-family:monospace;}
.byte:hover{transform:scale(1.08);border-color:#ffffff60;}
.byte.sel{transform:scale(1.1);border-color:#fff;box-shadow:0 0 10px #ffffff30;}
.byte .bv{font-size:.72rem;font-weight:bold;}
.byte .bi{font-size:.55rem;opacity:.55;}
.f0{background:#1a3a5c;color:#6bb3f0;} /* eth dst */
.f1{background:#1a4a3a;color:#6bf0a8;} /* eth src */
.f2{background:#4a3a1a;color:#f0c86b;} /* ethertype */
.f3{background:#3a1a4a;color:#c06bf0;} /* hw_type */
.f4{background:#3a3a1a;color:#f0f06b;} /* proto_type */
.f5{background:#1a3a3a;color:#6bf0f0;} /* hw/proto size */
.f6{background:#4a1a1a;color:#f06b6b;} /* opcode */
.f7{background:#1a4a2a;color:#a8f06b;} /* sender mac */
.f8{background:#2a1a4a;color:#a86bf0;} /* sender ip */
.f9{background:#4a2a1a;color:#f0906b;} /* target mac */
.f10{background:#1a2a4a;color:#6ba8f0;} /* target ip */
.byte-info-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-top:10px;font-family:monospace;font-size:.83rem;min-height:75px;}
.bib-field{color:var(--cyan);font-weight:bold;font-size:.95rem;}
.bib-off{color:var(--muted);font-size:.75rem;margin-left:8px;}
.bib-val{color:var(--green);margin-top:4px;}
.bib-desc{color:var(--text);margin-top:6px;line-height:1.6;font-family:'Segoe UI',sans-serif;font-size:.85rem;}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.legend-i{display:flex;align-items:center;gap:5px;font-size:.73rem;color:var(--muted);}
.legend-dot{width:11px;height:11px;border-radius:2px;}

/* ── Quiz ── */
.quiz-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;margin:20px 0;}
.quiz-box h3{color:var(--yellow);font-size:1rem;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.quiz-q{margin-bottom:24px;}
.quiz-q .qtext{font-size:.9rem;line-height:1.65;margin-bottom:12px;font-weight:500;}
.options{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .2s;background:var(--bg3);user-select:none;}
.opt:hover:not(.done){border-color:var(--blue);}
.opt.correct{border-color:var(--green);background:#1a3a1a;}
.opt.wrong{border-color:var(--red);background:#3a1a1a;}
.opt.done{cursor:default;}
.opt-radio{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;margin-top:2px;transition:all .2s;}
.opt.correct .opt-radio{border-color:var(--green);background:var(--green);}
.opt.wrong .opt-radio{border-color:var(--red);background:var(--red);}
.opt-label{font-size:.87rem;line-height:1.5;}
.explanation{display:none;margin-top:10px;padding:12px 14px;background:var(--bg);border-left:3px solid var(--blue);border-radius:4px;font-size:.83rem;line-height:1.65;color:var(--muted);}
.explanation.show{display:block;}
.explanation strong{color:var(--text);}
.q-score{font-size:.8rem;color:var(--muted);margin-top:4px;}

/* ── Alerts ── */
.alert{padding:12px 16px;border-radius:7px;margin:14px 0;font-size:.87rem;line-height:1.65;border-left:4px solid;}
.alert-info{background:#1a2a3a;border-color:var(--blue);}
.alert-warn{background:#3a2a1a;border-color:var(--yellow);}
.alert-ok{background:#1a3a1a;border-color:var(--green);}
.alert-danger{background:#3a1a1a;border-color:var(--red);}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-size:.87rem;font-weight:600;transition:all .2s;font-family:inherit;}
.btn-primary{background:var(--blue);color:#000;}
.btn-primary:hover{background:#79b8ff;}
.btn-success{background:var(--green);color:#000;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--blue);}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ── Code Editor ── */
.editor-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:14px 0;}
.editor-head{background:var(--bg2);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:.78rem;color:var(--muted);font-family:monospace;}
.editor-ta{width:100%;background:var(--bg3);color:var(--text);border:none;padding:14px 16px;font-family:'Courier New',monospace;font-size:.82rem;line-height:1.65;resize:vertical;min-height:220px;outline:none;}

/* ── Interactive exercises ── */
.exo-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;margin:18px 0;}
.exo-box h4{font-size:.9rem;color:var(--orange);margin-bottom:14px;}
.mac-live-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.mac-input-big{background:var(--bg3);border:2px solid var(--border);border-radius:7px;padding:10px 14px;color:var(--text);font-family:monospace;font-size:1rem;outline:none;width:220px;transition:border-color .2s;}
.mac-input-big:focus{border-color:var(--blue);}
.mac-input-big.valid{border-color:var(--green);}
.mac-input-big.invalid{border-color:var(--red);}
.parsed-bytes{display:flex;gap:5px;flex-wrap:wrap;}
.pbyte{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:.75rem;color:var(--muted);transition:all .3s;}
.pbyte.filled{background:#1a3a5c;color:#6bb3f0;border-color:#6bb3f060;}

.ip-input-big{background:var(--bg3);border:2px solid var(--border);border-radius:7px;padding:10px 14px;color:var(--text);font-family:monospace;font-size:1rem;outline:none;width:180px;transition:border-color .2s;}
.ip-input-big:focus{border-color:var(--blue);}
.ip-input-big.valid{border-color:var(--green);}
.ip-input-big.invalid{border-color:var(--red);}
.ip-bytes{display:flex;gap:5px;}
.ipbyte{width:44px;height:38px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:.75rem;color:var(--muted);transition:all .3s;}
.ipbyte.filled{background:#2a1a4a;color:#a86bf0;border-color:#a86bf060;}

/* Packet filter quiz */
.pkt-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin:14px 0;}
.pkt-card{background:var(--bg3);border:2px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .2s;position:relative;}
.pkt-card:hover:not(.answered){border-color:var(--blue);}
.pkt-card.selected{border-color:var(--blue);background:#1a2a3a;}
.pkt-card.correct-answer{border-color:var(--green);background:#1a3a1a;}
.pkt-card.wrong-answer{border-color:var(--red);background:#3a1a1a;}
.pkt-card .pkt-title{font-size:.8rem;font-weight:bold;color:var(--muted);margin-bottom:8px;font-family:monospace;}
.pkt-field{display:flex;justify-content:space-between;font-size:.78rem;font-family:monospace;margin-bottom:3px;}
.pkt-field .pf-key{color:var(--muted);}
.pkt-field .pf-val{color:var(--cyan);}
.pkt-verdict{position:absolute;top:8px;right:10px;font-size:1rem;}

/* Packet builder */
.pkt-builder{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:14px 0;}
.field-row{display:flex;flex-direction:column;gap:4px;}
.field-row label{font-size:.75rem;color:var(--muted);font-family:monospace;}
.field-input{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-family:monospace;font-size:.82rem;outline:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--blue);}
.field-input.ok{border-color:var(--green);}
.field-input.bad{border-color:var(--red);}
.field-hint{font-size:.72rem;color:var(--muted);font-style:italic;}

/* Scenario display */
.scenario-timeline{position:relative;padding-left:30px;}
.scenario-timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);}
.sc-step{position:relative;margin-bottom:24px;opacity:.4;transition:opacity .4s;}
.sc-step.active{opacity:1;}
.sc-dot{position:absolute;left:-24px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--border);border:2px solid var(--border);transition:all .4s;}
.sc-step.active .sc-dot{background:var(--blue);border-color:var(--blue);}
.sc-step.done .sc-dot{background:var(--green);border-color:var(--green);}
.sc-label{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:4px;}
.sc-desc{font-size:.8rem;color:var(--muted);line-height:1.55;}
.sc-pkt{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 12px;font-family:monospace;font-size:.73rem;margin-top:6px;color:var(--cyan);}

/* Unlock section */
.unlock-section{text-align:center;padding:28px;margin-top:28px;border-top:1px solid var(--border);}
.unlock-score{font-size:1.1rem;margin-bottom:14px;}
.unlock-score.perfect{color:var(--green);}
.unlock-score.partial{color:var(--yellow);}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .2s;user-select:none;}
.check-item:hover{border-color:var(--blue);}
.check-item.checked{border-color:var(--green);background:#1a3a1a;}
.check-box{width:16px;height:16px;border:2px solid var(--muted);border-radius:3px;flex-shrink:0;margin-top:1px;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.check-item.checked .check-box{border-color:var(--green);background:var(--green);}
.check-label{font-size:.85rem;line-height:1.5;}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.tab{padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:.82rem;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .2s;margin-bottom:-1px;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border);border-bottom-color:var(--bg3);}
.tab-pane{display:none;} .tab-pane.active{display:block;}

/* Scroll */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:768px){#sidebar{display:none;}#main{margin-left:0;padding:20px;}}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="logo">
    <h1>ft_malcolm</h1>
    <p>Guide interactif — ARP spoofing</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Progression</span><span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="step-list"></div>
</nav>

<main id="main">
  <div id="content"></div>
</main>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const TOTAL = 7;
let state = JSON.parse(localStorage.getItem('ftm_state') || 'null') || {
  current: 0,
  unlocked: [true,false,false,false,false,false,false],
  done: [false,false,false,false,false,false,false],
  quiz: {}
};

function save() { localStorage.setItem('ftm_state', JSON.stringify(state)); }

// ─── Step metadata ────────────────────────────────────────────────────────────
const STEPS = [
  { title:"ARP au niveau octet", sub:"Théorie + visualisation", icon:"📡" },
  { title:"Le squelette C", sub:"Header, structs packed", icon:"🏗️" },
  { title:"Parsing des arguments", sub:"MAC, IP, validation", icon:"🔍" },
  { title:"Réseau bas niveau", sub:"Socket RAW, bind, interface", icon:"🔌" },
  { title:"Réception filtrée", sub:"recvfrom + filtrage ARP", icon:"📥" },
  { title:"Construction du reply", sub:"Forger et envoyer la trame", icon:"⚡" },
  { title:"Bonus", sub:"Verbose, gratuitous, NDP/IPv6", icon:"🎯" },
];

// ─── Byte frame data ─────────────────────────────────────────────────────────
const FRAME_BYTES = [
  // Ethernet dst MAC — ff:ff:ff:ff:ff:ff (broadcast)
  {v:'FF',f:0,grp:'Ethernet dst MAC'},
  {v:'FF',f:0},{v:'FF',f:0},{v:'FF',f:0},{v:'FF',f:0},{v:'FF',f:0},
  // Ethernet src MAC — AA:AA:AA:AA:AA:AA (Target: 10.0.0.5)
  {v:'AA',f:1,grp:'Ethernet src MAC'},
  {v:'AA',f:1},{v:'AA',f:1},{v:'AA',f:1},{v:'AA',f:1},{v:'AA',f:1},
  // Ethertype — 0x0806 = ARP
  {v:'08',f:2,grp:'Ethertype'},{v:'06',f:2},
  // hw_type — 0x0001 = Ethernet
  {v:'00',f:3,grp:'hw_type'},{v:'01',f:3},
  // proto_type — 0x0800 = IPv4
  {v:'08',f:4,grp:'proto_type'},{v:'00',f:4},
  // hw_size & proto_size
  {v:'06',f:5,grp:'hw_size'},{v:'04',f:5,grp:'proto_size'},
  // opcode — 0x0001 = Request
  {v:'00',f:6,grp:'opcode'},{v:'01',f:6},
  // ARP sender MAC — AA:AA:AA:AA:AA:AA
  {v:'AA',f:7,grp:'ARP sender MAC'},
  {v:'AA',f:7},{v:'AA',f:7},{v:'AA',f:7},{v:'AA',f:7},{v:'AA',f:7},
  // ARP sender IP — 10.0.0.5
  {v:'0A',f:8,grp:'ARP sender IP'},{v:'00',f:8},{v:'00',f:8},{v:'05',f:8},
  // ARP target MAC — 00:00:00:00:00:00 (inconnu)
  {v:'00',f:9,grp:'ARP target MAC'},
  {v:'00',f:9},{v:'00',f:9},{v:'00',f:9},{v:'00',f:9},{v:'00',f:9},
  // ARP target IP — 10.0.0.10
  {v:'0A',f:10,grp:'ARP target IP'},{v:'00',f:10},{v:'00',f:10},{v:'0A',f:10},
];

const FIELD_INFO = [
  { name:'Ethernet DST MAC', color:'#6bb3f0', bg:'#1a3a5c',
    desc:'À qui on envoie la trame Ethernet. Pour une ARP request = <strong>FF:FF:FF:FF:FF:FF</strong> (broadcast : tout le LAN reçoit). Pour un reply = la MAC de la machine à qui on répond.' },
  { name:'Ethernet SRC MAC', color:'#6bf0a8', bg:'#1a4a3a',
    desc:'Qui envoie la trame. La carte réseau qui émet remplit ce champ avec sa propre MAC automatiquement (ou on le fait à la main en raw socket).' },
  { name:'Ethertype', color:'#f0c86b', bg:'#4a3a1a',
    desc:'Indique aux couches supérieures comment décoder le payload. <strong>0x0806 = ARP</strong>. 0x0800 = IPv4. 0x86DD = IPv6. Sans ce champ, on ne saurait pas quoi faire des 28 octets suivants.' },
  { name:'hw_type', color:'#c06bf0', bg:'#3a1a4a',
    desc:'Type de médium physique. <strong>0x0001 = Ethernet</strong>. Indique que les adresses matérielles sont des MAC 48 bits.' },
  { name:'proto_type', color:'#f0f06b', bg:'#3a3a1a',
    desc:'Protocole de couche 3 concerné par cette résolution. <strong>0x0800 = IPv4</strong>. C\'est le même encodage que l\'Ethertype — pas un hasard.' },
  { name:'hw_size / proto_size', color:'#6bf0f0', bg:'#1a3a3a',
    desc:'Tailles des adresses. hw_size = <strong>6</strong> (MAC = 6 octets). proto_size = <strong>4</strong> (IPv4 = 4 octets). Ces champs rendent ARP générique : en théorie, il marcherait avec d\'autres protocoles.' },
  { name:'opcode', color:'#f06b6b', bg:'#4a1a1a',
    desc:'<strong>0x0001 = Request</strong> (« qui a cette IP ? »). <strong>0x0002 = Reply</strong> (« c\'est moi, voilà ma MAC »). ft_malcolm intercepte les requests (1) et envoie un reply (2) falsifié.' },
  { name:'ARP Sender MAC', color:'#a8f06b', bg:'#1a4a2a',
    desc:'MAC de l\'émetteur du paquet ARP. Dans la request, c\'est la MAC de Target (AA:AA…). Dans le reply forgé, tu mets <strong>ta propre MAC</strong> (ou une MAC fictive).' },
  { name:'ARP Sender IP', color:'#a86bf0', bg:'#2a1a4a',
    desc:'IP de l\'émetteur du paquet ARP. Ici 10.0.0.5 = Target, qui pose la question. Dans le reply forgé, tu mets l\'IP de Source (10.0.0.10) pour dire « c\'est moi qui ai cette IP ».' },
  { name:'ARP Target MAC', color:'#f0906b', bg:'#4a2a1a',

<p class="step-desc">Le socket reçoit toutes les trames ARP de l'interface. On doit filtrer pour ne garder que les ARP requests qui demandent l'IP de Source. Tout le reste est ignoré.</p>

<div class="section">
  <h3>📥 La boucle de réception</h3>
  <pre><span class="ty">uint8_t</span> buf[42]; <span class="cm">// 14 (Ethernet) + 28 (ARP) = 42 octets minimum</span>

<span class="kw">while</span> (1)
{
    <span class="ty">ssize_t</span> n = <span class="fn">recvfrom</span>(sock, buf, <span class="kw">sizeof</span>(buf), 0, NULL, NULL);
    <span class="kw">if</span> (n < 42)
        <span class="kw">continue</span>; <span class="cm">// trame trop courte → pas un ARP valide</span>

    <span class="kw">struct</span> <span class="ty">t_eth_hdr</span> *eth = (<span class="kw">struct</span> <span class="ty">t_eth_hdr</span> *)buf;
    <span class="kw">struct</span> <span class="ty">t_arp_pkt</span> *arp = (<span class="kw">struct</span> <span class="ty">t_arp_pkt</span> *)(buf + 14);

    <span class="cm">// Filtre 1 : c'est bien de l'ARP ?</span>
    <span class="kw">if</span> (<span class="fn">ntohs</span>(eth->ethertype) != ETH_P_ARP)
        <span class="kw">continue</span>;

    <span class="cm">// Filtre 2 : c'est une request (opcode = 1) ?</span>
    <span class="kw">if</span> (<span class="fn">ntohs</span>(arp->opcode) != 1)
        <span class="kw">continue</span>;

    <span class="cm">// Filtre 3 : la target IP est bien celle de Source ?</span>
    <span class="kw">if</span> (arp->target_ip != addrs->src_ip)
        <span class="kw">continue</span>;

    <span class="cm">// Match ! On forge et envoie le reply.</span>

{
    <span class="ty">uint8_t</span> buf[42];

    <span class="fn">memcpy</span>(eth->dst_mac, req->sender_mac, 6);   <span class="cm">// Target reçoit</span>

    eth->ethertype = <span class="fn">htons</span>(ETH_P_ARP);

    <span class="cm">/* === ARP payload === */</span>
    arp->hw_type    = <span class="fn">htons</span>(1);
    arp->proto_type = <span class="fn">htons</span>(ETH_P_IP);
    arp->hw_size    = 6;

    sll.sll_ifindex  = addrs->ifindex;
    sll.sll_protocol = <span class="fn">htons</span>(ETH_P_ARP);
    <span class="fn">sendto</span>(sock, buf, 42, 0,

<div class="section">
  <h3>🌐 IPv6 / NDP (Neighbor Discovery Protocol)</h3>
  <p>IPv6 n'utilise pas ARP mais <strong>NDP</strong>, qui passe par ICMPv6. Le principe est identique : résoudre une adresse L3 (IPv6) en adresse L2 (MAC).</p>
  <div class="tbl-wrap">

    <tr><td>Question</td><td>ARP Request (opcode 1)</td><td>Neighbor Solicitation (type 135)</td></tr>
    <tr><td>Réponse</td><td>ARP Reply (opcode 2)</td><td>Neighbor Advertisement (type 136)</td></tr>
    <tr><td>Multicast</td><td>Broadcast Ethernet</td><td>Multicast IPv6 solicited-node</td></tr>
    <tr><td>Socket</td><td>AF_PACKET / ETH_P_ARP</td><td>AF_PACKET / ETH_P_IPV6</td></tr>

  <div class="alert alert-warn">⚠️ Le checksum ICMPv6 est obligatoire (contrairement à ARP qui n'en a pas). Implémente <code>checksum16()</code> sur un pseudo-header IPv6.</div>

function buildByteFrame() {
  let html = `
<div class="frame-outer">
  <div class="legend">
    ${[
      ['f0','Eth DST MAC'],['f1','Eth SRC MAC'],['f2','Ethertype'],
      ['f3','hw_type'],['f4','proto_type'],['f5','hw/proto size'],
      ['f6','opcode'],['f7','ARP sender MAC'],['f8','ARP sender IP'],
      ['f9','ARP target MAC'],['f10','ARP target IP'],
    ].map(([cls,label])=>`<div class="legend-i"><div class="legend-dot ${cls}"></div>${label}</div>`).join('')}
  </div>
  <div style="margin-bottom:6px;"><div class="frame-seg-label">◀ Ethernet header (14 octets) ▶</div></div>
  <div class="byte-row" id="byte-row-eth">`;

  FRAME_BYTES.slice(0,14).forEach((b,i)=>{
    html += `<div class="byte f${b.f}" id="byte${i}" onclick="selectByte(${i})" title="${FIELD_INFO[b.f].name}">
      <div class="bv">${b.v}</div><div class="bi">${i}</div></div>`;
  });

  html += `</div>
  <div style="margin:6px 0 4px;"><div class="frame-seg-label">◀ ARP payload (28 octets) ▶</div></div>
  <div class="byte-row" id="byte-row-arp">`;

  FRAME_BYTES.slice(14).forEach((b,i)=>{
    const gi = i+14;
    html += `<div class="byte f${b.f}" id="byte${gi}" onclick="selectByte(${gi})" title="${FIELD_INFO[b.f].name}">
      <div class="bv">${b.v}</div><div class="bi">${gi}</div></div>`;
  });

  html += `</div>
  <div class="byte-info-box" id="byte-info">
    <span style="color:var(--muted);font-size:.82rem;">← Clique sur un octet pour voir son rôle</span>
  </div>
</div>`;
  return html;
}

let selectedByte = -1;

window.selectByte = function(idx) {
  if (selectedByte >= 0) document.getElementById('byte'+selectedByte)?.classList.remove('sel');
  selectedByte = idx;
  document.getElementById('byte'+idx)?.classList.add('sel');
  const b = FRAME_BYTES[idx];

  if (box) box.innerHTML = `
    <div><span class="bib-field">${fi.name}</span><span class="bib-off"> — octet ${idx} (offset ${idx >= 14 ? idx-14 : idx} ${idx<14?'dans Eth':'dans ARP'})</span></div>
    <div class="bib-val">Valeur: 0x${b.v}${b.grp ? ' — champ "'+b.grp+'"' : ''}</div>

};

// Quiz
window.answerQ = function(step, qi, oi) {
  const q = QUIZZES[step][qi];
  const key = `${step}-${qi}`;
  if (state.quiz[key] !== undefined) return;
  const correct = oi === q.correct;
  state.quiz[key] = correct ? 1 : 0;
  save();

  document.querySelectorAll(`[id^="opt-${step}-${qi}-"]`).forEach(el => el.classList.add('done'));
  document.getElementById(`opt-${step}-${qi}-${oi}`).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById(`opt-${step}-${qi}-${q.correct}`).classList.add('correct');
  document.getElementById(`expl-${step}-${qi}`).classList.add('show');
  document.getElementById(`score-${step}-${qi}`).textContent = correct ? '✓ Bonne réponse !' : '✗ Mauvaise réponse — lis l\'explication.';

  checkQuizComplete(step);
};

function checkQuizComplete(step) {
  const qs = QUIZZES[step];
  if (!qs) return;
  const answered = qs.filter((_,i) => state.quiz[`${step}-${i}`] !== undefined).length;
  const correct = qs.filter((_,i) => state.quiz[`${step}-${i}`] === 1).length;
  if (answered < qs.length) return;
  const unlock = document.getElementById(`unlock${step}`);
  const score = document.getElementById(`unlock${step}-score`);
  if (!unlock) return;
  unlock.style.display = 'block';
  score.textContent = `Score : ${correct}/${qs.length}`;
  score.className = `unlock-score ${correct === qs.length ? 'perfect' : 'partial'}`;
}

window.unlockStep = function(n) {
  if (n < TOTAL && !state.unlocked[n]) {
    state.unlocked[n] = true;
    state.done[n-1] = true;
    save();
    renderSidebar();
    updateProgress();
  }
  goStep(n);
};

// Live MAC parser
window.liveMac = function(el) {
  const val = el.value.trim();
  const parts = val.split(':');
  const valid = parts.length === 6 && parts.every(p => /^[0-9a-fA-F]{1,2}$/.test(p));
  el.className = 'mac-input-big ' + (val.length === 0 ? '' : valid ? 'valid' : 'invalid');
  const status = document.getElementById('mac-status');
  if (status) status.textContent = val.length === 0 ? '' : valid ? '✓ Format valide' : '✗ Format invalide';
  if (status) status.style.color = valid ? 'var(--green)' : 'var(--red)';
  for (let i = 0; i < 6; i++) {
    const b = document.getElementById('mb'+i);
    if (!b) continue;
    if (valid) {
      b.textContent = parts[i].toUpperCase().padStart(2,'0');
      b.className = 'pbyte filled';
    } else {
      b.textContent = '--';
      b.className = 'pbyte';
    }
  }
};

// Live IP parser
window.liveIP = function(el) {
  const val = el.value.trim();
  const parts = val.split('.');
  const valid = parts.length === 4 && parts.every(p => /^\d+$/.test(p) && parseInt(p) >= 0 && parseInt(p) <= 255);
  el.className = 'ip-input-big ' + (val.length === 0 ? '' : valid ? 'valid' : 'invalid');
  const status = document.getElementById('ip-status');
  if (status) status.textContent = val.length === 0 ? '' : valid ? '✓ Format valide' : '✗ Format invalide';
  if (status) status.style.color = valid ? 'var(--green)' : 'var(--red)';
  for (let i = 0; i < 4; i++) {
    const b = document.getElementById('ib'+i);
    if (!b) continue;
    if (valid) {
      b.textContent = '0x'+parseInt(parts[i]).toString(16).toUpperCase().padStart(2,'0');
      b.className = 'ipbyte filled';
    } else {
      b.textContent = '--';
      b.className = 'ipbyte';
    }
  }
};

// ─── Navigation ───────────────────────────────────────────────────────────────
const CONTENT_FNS = [
  contentStep0, contentStep1, contentStep2, contentStep3,
  contentStep4, contentStep5, contentStep6
];

function goStep(n) {
  if (!state.unlocked[n]) return;
  state.current = n;
  save();
  renderSidebar();
  renderContent(n);
  window.scrollTo(0,0);

  // Re-init dynamic elements after render
  setTimeout(() => {
    initBlanks();
    if (n === 0) restoreQuiz(0);
  }, 50);
}

function restoreQuiz(step) {
  const qs = QUIZZES[step];
  if (!qs) return;
  qs.forEach((q,qi) => {
    const key = `${step}-${qi}`;
    if (state.quiz[key] === undefined) return;
    const correct = q.correct;
    // Highlight selected and correct
    const answered = true;
    document.querySelectorAll(`[id^="opt-${step}-${qi}-"]`).forEach(el => el.classList.add('done'));
    if (state.quiz[key] === 1) {
      document.getElementById(`opt-${step}-${qi}-${correct}`)?.classList.add('correct');
    } else {
      document.getElementById(`opt-${step}-${qi}-${correct}`)?.classList.add('correct');
    }
    document.getElementById(`expl-${step}-${qi}`)?.classList.add('show');
    const scoreEl = document.getElementById(`score-${step}-${qi}`);
    if (scoreEl) scoreEl.textContent = state.quiz[key] === 1 ? '✓ Bonne réponse !' : '✗ Mauvaise réponse — lis l\'explication.';
  });
  checkQuizComplete(step);
}

function renderContent(n) {
  const el = document.getElementById('content');
  if (el) el.innerHTML = CONTENT_FNS[n]();
}

function renderSidebar() {
  const list = document.getElementById('step-list');
  if (!list) return;
  list.innerHTML = STEPS.map((s,i)=>`
<div class="step-item ${i===state.current?'active':''} ${!state.unlocked[i]?'locked':''} ${state.done[i]?'done':''}"
     onclick="goStep(${i})">
  <div class="s-icon">${state.done[i]?'✓':state.unlocked[i]?s.icon:'🔒'}</div>
  <div>
    <div class="s-title">${i+1}. ${s.title}</div>
    <div class="s-sub">${s.sub}</div>
  </div>
</div>`).join('');
}

function updateProgress() {
  const done = state.done.filter(Boolean).length;
  const pct = Math.round(done / TOTAL * 100);
  const fill = document.getElementById('prog-fill');
  const lbl = document.getElementById('prog-pct');
  if (fill) fill.style.width = pct+'%';
  if (lbl) lbl.textContent = pct+'%';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderSidebar();
updateProgress();
renderContent(state.current);
setTimeout(() => {
  initBlanks();
  if (state.current === 0) restoreQuiz(0);
}, 50);
